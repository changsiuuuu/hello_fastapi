name: fastapiИІ aws linuxПЁ ЙшЦїЧЯБт

on:
  push:
    branches: ["master"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: ssh ПјАн ИэЗЩ
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            cd ~/hello_fastapi
            
            #ЧСЗЮСЇЦЎ АцЗЮЗЮ РЬЕП ШФ gitРЬ МГФЁЕЧОюРжАэ clone ЕЧОюРжДй АЁСЄ ЧЯПЁ pull
            git pull origin master
            
            # python АЁЛѓШЏАц ШАМКШ­ Йз РЧСИМК ОїЕЅРЬЦЎ
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            # НЧЧрСпРЮ ЧСЗЮММНКАЁ РжРИИщ СОЗс
            fuser -k 8000/tcp || true
            
            # ЙщБзЖѓПюЕхЗЮ НЧЧрЧЯБт
            # nohupРИЗЮ НЧЧрЧЯАэ ЗЮБзДТ app.logПЁ ГВБтБт
            nohup python3 -m uvicorn main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &